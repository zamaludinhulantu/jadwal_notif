name: SISKP Jadwal Notifier

on:
  push:
    branches:
      - main
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: siskp-jadwal-notifier
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      SISKP_BASE_URL: https://siskp.informatika.ft.ung.ac.id/masuk/jadwal
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MY_NAME: ${{ secrets.MY_NAME }}
      MY_NIM: ${{ secrets.MY_NIM }}
      CHECK_NEXT_MONTH: "true"
      STORAGE_PATH: data/sent_schedules.json
      TIMEZONE: Asia/Makassar
      MAX_NOTIFICATIONS_PER_RUN: "10"
      SEND_NO_UPDATE_NOTIFICATION: "true"
      NO_UPDATE_NOTIFICATION_EVERY_RUN: "false"
      HEARTBEAT_INTERVAL_MINUTES: "30"
      HEARTBEAT_STATE_PATH: data/heartbeat_state.json

    steps:
      - name: Checkout repository

        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare state file
        shell: bash
        run: |
          mkdir -p data
          if [ ! -f data/sent_schedules.json ]; then
            echo "[]" > data/sent_schedules.json
          fi
          if [ ! -f data/heartbeat_state.json ]; then
            echo "{}" > data/heartbeat_state.json
          fi

      - name: Run notifier
        run: python main.py

      - name: Commit state changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sent_schedules.json data/heartbeat_state.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan state."
          else
            git commit -m "chore: update SISKP notifier state"
            git push
          fi
